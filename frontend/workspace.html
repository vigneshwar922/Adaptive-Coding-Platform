<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace — BiteCode</title>
  <link rel="stylesheet" href="css/workspace.css">
</head>
<body>
  <!-- Top Nav bar -->
  <div class="workspace-header">
    <button onclick="window.location.href='courses.html'" class="back-btn">← Back to Courses</button>
    <h2 id="header-title">Loading Course...</h2>
  </div>

  <div class="workspace-container">
    <!-- Left Panel: Video & Editorial -->
    <div class="learning-panel">
      <div class="video-section">
        <iframe id="course-video" width="100%" height="350" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="editorial-section">
        <h1 id="course-title">Course Title</h1>
        <p id="course-description">Course description will load here...</p>
        <hr>
        <h3>Task:</h3>
        <p id="course-task">Listen to the video above and implement your solution on the right.</p>
      </div>
    </div>

    <!-- Right Panel: Code Editor & Terminal -->
    <div class="coding-panel">
      <div class="editor-controls">
        <select id="language-select" onchange="changeLanguage()" style="border:1px solid #135fc2; border-radius:6px; padding:6px 12px; background:#c41212; cursor:pointer;">
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="javascript">JavaScript</option>
          <option value="c">C</option>
          <option value="cpp">C++</option>
        </select>
        <button id="run-btn">▶ Run Code</button>
      </div>
      <div id="editor-container"></div>
      <div id="custom-input-container" style="padding: 10px; background: #1e1e1e; border-top: 1px solid #333;">
        <h4 style="margin: 0 0 8px 0; color: #e2e8f0; font-size: 14px; font-weight: 500;">Custom Input</h4>
        <textarea id="custom-input" placeholder="Enter input here..." style="width: 100%; height: 60px; background: #ffffff; color: #1e293b; border: 1px solid #cbd5e1; border-radius: 4px; padding: 8px; font-family: monospace; resize: vertical; box-sizing: border-box;"></textarea>
      </div>
      <div id="console-output">Ready. Write your code and click Run.</div>
    </div>
  </div>
   <script src="js/api.js"></script>
  <!-- Load Monaco Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
  <script>
    // ---------------------------
    // 1. Course Data
    // ---------------------------
    const courseData = {
      'arrays': {
        title: 'Arrays & Strings',
        videoId: '37E9ckMDdTk',
        desc: 'Learn how to manipulate arrays and strings using the two-pointer technique.',
        task: 'Write a function that reverses a string in-place.'
      },
      'trees': {
        title: 'Trees & Graphs',
        videoId: 'oSWTXtMglKE',
        desc: 'Traverse trees using DFS and BFS.',
        task: 'Implement an In-Order traversal of a BST.'
      }
    };

    // ---------------------------
    // 2. Load Course
    // ---------------------------
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('course') || 'arrays';
    const currentCourse = courseData[courseId];

    if(currentCourse) {
      document.getElementById('header-title').innerText = currentCourse.title;
      document.getElementById('course-title').innerText = currentCourse.title;
      document.getElementById('course-description').innerText = currentCourse.desc;
      document.getElementById('course-task').innerText = currentCourse.task;
      document.getElementById('course-video').src = `https://www.youtube.com/embed/${currentCourse.videoId}`;
    }

    // ---------------------------
    // 3. Monaco Editor Init
    // ---------------------------
    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});
    require(['vs/editor/editor.main'], function() {
      window.editor = monaco.editor.create(document.getElementById('editor-container'), {
        value: `# Write your solution for ${currentCourse.title}\nprint("Hello World")`,
        language: 'python',
        theme: 'vs-dark',
        fontSize: 14,
        automaticLayout: true
      });
    });

    // ---------------------------
    // 4. Language Switching
    // ---------------------------
    function changeLanguage() {
      const lang = document.getElementById('language-select').value;
      monaco.editor.setModelLanguage(window.editor.getModel(), lang);
    }
// ---------------------------
    // 5. Run Code with Backend API (Local Judge0)
    // ---------------------------
    document.getElementById('run-btn').addEventListener('click', async () => {
      const code = window.editor.getValue();
      const lang = document.getElementById('language-select').value;
      const customInput = document.getElementById('custom-input').value;
      const outputConsole = document.getElementById('console-output');
      
      outputConsole.innerHTML = "Running...<br>";

      try {
        // This calls the backend '/api/submissions/run' route 
        // which safely communicates with your local Docker Judge0 instance!
        const result = await submissions.run(lang, code, customInput);

        // Catch python specific infinite loop output error
        if ((result.stderr || '').includes('File too large') || (result.error || '').includes('File too large')) {
          result.status = 'Time Limit Exceeded';
          result.stderr = 'Your code produced too much output. This is likely due to an infinite loop causing a Time/Output Limit Exceeded.';
          result.error = null;
        }

        outputConsole.innerHTML = ""; // Clear loading text

        if (result.stdout) {
          outputConsole.innerHTML += `<span style="color:#4CAF50;">Output:</span><br><pre style="margin-top:4px; font-family: monospace;">${result.stdout}</pre>`;
        } 
        
        if (result.stderr) {
          outputConsole.innerHTML += `<span style="color:#ff4444;">Error:</span><br><pre style="margin-top:4px; font-family: monospace;">${result.stderr}</pre>`;
        } 
        
        if (result.compile_output) {
          outputConsole.innerHTML += `<span style="color:#ff4444;">Compile Output:</span><br><pre style="margin-top:4px; font-family: monospace;">${result.compile_output}</pre>`;
        }

        if (result.status && result.status !== 'Accepted') {
          outputConsole.innerHTML += `<div style="margin-top: 8px;"><span style="color:#ff4444; font-weight:bold;">Status: ${result.status}</span></div>`;
          if (result.time) {
            outputConsole.innerHTML += `<div><span style="color:#94a3b8;">Execution Time: ${result.time}s</span></div>`;
          }
        } else if (!result.stdout && !result.stderr && !result.compile_output) {
          // If the code ran but produced absolutely no output or errors
          outputConsole.innerHTML = `<span style="color:#94a3b8;">Status: ${result.status || 'No output produced'}</span>`;
        }

      } catch (error) {
        outputConsole.innerHTML = `<span style="color:#ff4444;">Execution Error: ${error.message}</span>`;
      }
    });
  </script>
</body>
</html>
