<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive-Coding-Platform — Problem</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <nav class="main-nav">
    <a href="index.html" class="logo">Random</a>
    <div id="nav-actions" class="nav-links">
      <!-- Shared navbar logic from api.js -->
    </div>
  </nav>

  <div id="toast-container" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

  <div class="problem-page-container">
    <div class="problem-split-view">

      <!-- LEFT SECTION: Description & Submissions -->
      <div class="problem-left-section">
        <div class="section-tabs">
          <div class="section-tab active" onclick="switchLeftTab('statement')">Problem Statement</div>
          <div class="section-tab" onclick="switchLeftTab('submissions')">Submissions</div>
        </div>

        <div id="tab-content-statement" class="tab-pane active">
          <div id="problem-loading" class="loading">Loading problem...</div>
          <div id="problem-content" style="display:none;">
            <div class="problem-header">
              <h2 id="problem-title"></h2>
              <div class="problem-meta">
                <span id="problem-difficulty" class="badge"></span>
                <span id="problem-topic" class="topic-tag"></span>
              </div>
            </div>
            <div id="problem-description" class="markdown-content"></div>

            <div class="examples-section">
              <h4>Example Cases</h4>
              <div id="problem-examples"></div>
            </div>
          </div>
        </div>

        <div id="tab-content-submissions" class="tab-pane">
          <div class="submissions-container">
            <h4>History</h4>
            <div id="submissions-list">
              <p class="empty-state">No submissions yet.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT SECTION: Editor -->
      <div class="problem-right-section">
        <div class="editor-header">
          <div class="language-picker">
            <select id="language-select" onchange="changeLanguage()" style="border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 12px; background: #ffffff; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); outline: none;">
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="javascript">JavaScript</option>
              <option value="c">C</option>
              <option value="cpp">C++</option>
            </select>
          </div>
          <div class="editor-actions" style="display: flex; gap: 8px;">
            <button class="btn btn-outline" style="padding: 6px 16px; font-size: 13px; height: 34px; line-height: 1;" onclick="toggleConsole()">Console</button>
            <button class="btn btn-outline" style="padding: 6px 16px; font-size: 13px; height: 34px; line-height: 1;" title="Reset Code" onclick="resetCode()">Reset</button>
          </div>
        </div>

        <div id="editor-container">
          <div id="editor"></div>
        </div>

        <!-- FIXED BOTTOM CONSOLE -->
        <div class="fixed-console">
          <div class="console-tabs" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="display:flex;">
              <div class="console-tab active" onclick="switchConsoleTab('output')">Console</div>
              <div class="console-tab" onclick="switchConsoleTab('testcases')">Test Cases</div>
            </div>
            <div class="console-actions" style="padding-right:12px; display:flex; gap:12px;">
              <button class="btn btn-outline" style="padding: 10px 24px; font-size: 15px;" onclick="runCode()">Run</button>
              <button class="btn btn-primary" style="padding: 10px 24px; font-size: 15px;" onclick="submitCode()">Submit</button>
            </div>
          </div>

          <div class="console-body">
            <div id="console-output" class="console-pane active">
              <pre id="result-content" class="console-text">Output will appear here...</pre>
            </div>
            <div id="console-testcases" class="console-pane">
              <div id="testcases-content" class="console-text">Example test cases will be shown here.</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Monaco Editor CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/problem.js"></script>

</body>

</html>
