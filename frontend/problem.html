<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Platform — Problem</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav>
    <a href="problems.html" class="logo">DSA Platform</a>
    <div class="nav-links">
      <a href="problems.html">Problems</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </nav>

  <div class="container" style="max-width:100%; padding: 16px 24px;">
    <div class="problem-layout">

      <!-- LEFT SIDE: Problem description -->
      <div class="problem-description">
        <div id="problem-loading" class="loading">Loading problem...</div>
        <div id="problem-content" style="display:none;">
          <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px;">
            <h2 id="problem-title"></h2>
            <span id="problem-difficulty" class="badge"></span>
            <span id="problem-topic" style="color:#a0a0b0; font-size:13px;"></span>
          </div>
          <p id="problem-description"></p>

          <h4 style="color:#a0a0b0; margin-bottom:8px; font-size:13px; text-transform:uppercase;">Examples</h4>
          <div id="problem-examples"></div>

          <!-- Submissions history -->
          <div style="margin-top:28px;">
            <h4 style="color:#a0a0b0; margin-bottom:12px; font-size:13px; text-transform:uppercase;">My Submissions</h4>
            <div id="submissions-list">
              <p style="color:#555; font-size:14px;">No submissions yet.</p>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT SIDE: Code editor -->
      <div class="code-panel">

        <div class="code-toolbar">
          <select id="language-select">
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
          </select>
          <div style="display:flex; gap:10px;">
            <button class="btn" style="background:#2d2d44; color:#e0e0e0;" onclick="runCode()">Run</button>
            <button class="btn btn-success" onclick="submitCode()">Submit</button>
            <button class="btn" style="background:#1a1a2e; color:#6366f1; border:1px solid #6366f1;" onclick="resetCode()">Reset</button>
          </div>
        </div>

        <!-- Monaco Editor -->
        <div id="editor" style="height:450px; border-radius:10px; overflow:hidden;"></div>

        <!-- Result box -->
        <div class="result-box" id="result-box">
          <div style="display:flex; gap:12px; margin-bottom:12px;">
            <button onclick="showTab('result')" id="tab-result"
              style="background:none; border:none; color:#6366f1; font-size:13px;
              cursor:pointer; border-bottom:2px solid #6366f1; padding-bottom:4px;">
              Result
            </button>
            <button onclick="showTab('testcases')" id="tab-testcases"
              style="background:none; border:none; color:#a0a0b0; font-size:13px;
              cursor:pointer; padding-bottom:4px;">
              Test Cases
            </button>
          </div>

          <div id="panel-result">
            <div id="result-content" style="color:#a0a0b0; font-size:14px;">
              Write your code and click Run or Submit.
            </div>
          </div>

          <div id="panel-testcases" style="display:none;">
            <div id="testcases-content" style="font-size:14px; color:#a0a0b0;">
              Click Run to test against example cases.
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Monaco Editor CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/problem.js"></script>

</body>
</html>
