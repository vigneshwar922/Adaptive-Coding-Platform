<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Random</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar top-nav">
        <div class="nav-container">
            <div class="nav-left">
                <a href="index.html" class="logo">Random</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-header">
                <h1 class="auth-title">Create an Account</h1>
                <p class="text-secondary">Join Random to master your skills.</p>
            </div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" class="form-input" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <input type="email" id="email" class="form-input" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" style="background-color: var(--accent-primary); color: #000;">Sign Up</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Log In</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            // Mock Signup Process
            const user = { username: username, email: email };
            localStorage.setItem('currentUser', JSON.stringify(user));
            // Redirect to home page
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
